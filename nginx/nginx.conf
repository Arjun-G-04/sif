events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        # Since aaPanel handles SSL and the actual domain, we can use a catch-all here
        server_name _;

        # Route requests to Adminer
        location /adminer/ {
            proxy_pass http://adminer:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Required for potential redirects from Adminer
            proxy_redirect off;
        }

        # Route all other requests to the web frontend
        location / {
            proxy_pass http://web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
