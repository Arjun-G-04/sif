services:
  web:
    build:
      context: .
      target: runner
    env_file: .env.prod
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - media_data:/app/media

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: sif
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:5.4.1
    command: php -S 0.0.0.0:8080 -t /var/www/html
    restart: unless-stopped
    depends_on:
      - db

  migrator:
    profiles: ["tools"]
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgres://db_user:${DB_PASS}@db:5432/sif
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - adminer
    restart: unless-stopped

volumes:
  db_data:
  media_data: